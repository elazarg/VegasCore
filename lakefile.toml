name = "VegasCore"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Vegas", "VegasTests"]

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

[[require]]
name = "GameTheory"
path = "GameTheory"

[[lean_lib]]
name = "Vegas"
[lean_lib.leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
linter.style.header = false
maxSynthPendingDepth = 3

[[lean_lib]]
name = "VegasTests"
[lean_lib.leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
linter.style.header = false
maxSynthPendingDepth = 3
